name: SkillClaw — Pantheon Collective Brain

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours — The Pulse

jobs:
  skillclaw_bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run SkillClaw Pantheon Bridge
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.WORKERZERO_TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.WORKERZERO_TELEGRAM_CHAT_ID }}
          SHARED_SKILL_DIR: ./pantheon_skills
        run: python skillclaw_pantheon_bridge.py

      - name: Self-restart (eternal loop)
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'skillclaw.yml',
              ref: 'master'
            });
