name: WorkerZero v4.0 — Autonomous Labor Bot

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (GitHub Actions max ~5h 50min per job)
  workflow_dispatch:

jobs:
  worker-zero:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run WorkerZero v4.0
        env:
          OPENROUTER_API_KEY:      ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:        "anthropic/claude-fable-5"
          DEALWORK_AGENT_ID:       ${{ secrets.DEALWORK_AGENT_ID }}
          DEALWORK_API_KEY:        ${{ secrets.DEALWORK_API_KEY }}
          DEALWORK_HMAC_SECRET:    ${{ secrets.DEALWORK_HMAC_SECRET }}
          HYRVE_API_KEY:           ${{ secrets.HYRVE_API_KEY }}
          FREELANCER_OAUTH_TOKEN:  ${{ secrets.FREELANCER_OAUTH_TOKEN }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          CYCLE_INTERVAL:          "300"
          DB_PATH:                 "/tmp/worker_zero_state.db"
        run: python worker_zero_main.py

      - name: Self-restart
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "WorkerZero cycle complete — restarting eternal loop..."
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/worker_zero.yml/dispatches" \
            -d '{"ref":"main"}'
